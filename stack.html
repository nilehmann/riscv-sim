<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RISC-V: La Pila de Llamadas</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --surface: #f6f8fa;
        --surface2: #eaeef2;
        --border: #d0d7de;
        --text: #1f2328;
        --text-dim: #656d76;
        --text-faint: #9198a1;
        --green: #1a7f37;
        --green-dim: rgba(26, 127, 55, 0.1);
        --blue: #0969da;
        --blue-dim: rgba(9, 105, 218, 0.1);
        --orange: #9a6700;
        --orange-dim: rgba(154, 103, 0, 0.12);
        --red: #cf222e;
        --red-dim: rgba(207, 34, 46, 0.1);
        --purple: #8250df;
        --purple-dim: rgba(130, 80, 223, 0.1);
        --mono: "IBM Plex Mono", monospace;
        --sans: "IBM Plex Sans", sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── MAIN GRID ── */
      .main {
        flex: 1;
        display: grid;
        grid-template-columns: 360px 1fr 220px;
        grid-template-rows: 1fr;
        gap: 0;
        overflow: hidden;
        min-height: 0;
      }

      /* ── CODE PANEL ── */
      .code-panel {
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .code-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 16px 0;
      }

      .line {
        font-family: var(--mono);
        font-size: 17px;
        line-height: 1.8;
        padding: 0 16px;
        display: flex;
        align-items: center;
        gap: 0;
        white-space: pre;
        transition: background 0.2s;
        border-left: 2px solid transparent;
      }
      .line.hl {
        background: rgba(9, 105, 218, 0.07);
        border-left-color: var(--blue);
      }
      .pc-arrow {
        display: inline-block;
        width: 16px;
        text-align: center;
        color: var(--blue);
        font-size: 13px;
        user-select: none;
        flex-shrink: 0;
        visibility: hidden;
      }
      .line.next-instr .pc-arrow {
        visibility: visible;
      }
      .line-num {
        color: var(--text-faint);
        min-width: 24px;
        text-align: right;
        margin-right: 16px;
        user-select: none;
        font-size: 15px;
      }
      .asm-addr {
        color: var(--text-faint);
        font-size: 14px;
        min-width: 72px;
        margin-right: 6px;
        user-select: none;
      }

      /* syntax colors */
      .kw {
        color: var(--red);
      }
      .reg {
        color: var(--green);
      }
      .imm {
        color: var(--orange);
      }
      .lbl {
        color: var(--blue);
        font-weight: 600;
      }
      .fn {
        color: var(--purple);
      }
      .cmt {
        color: var(--text-faint);
        font-style: italic;
      }

      /* ── STACK + DESCRIPTION CENTER PANEL ── */
      .center-panel {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .description-box {
        padding: 16px 20px;
        border-top: 1px solid var(--border);
        background: var(--surface);
        min-height: 80px;
        flex-shrink: 0;
      }
      .desc-label {
        font-family: var(--mono);
        font-size: 14px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-faint);
        margin-bottom: 6px;
      }
      .desc-text {
        font-size: 18px;
        color: var(--text);
        line-height: 1.6;
      }
      .desc-text code {
        font-family: var(--mono);
        font-size: 16px;
        background: var(--surface2);
        border: 1px solid var(--border);
        padding: 1px 5px;
        border-radius: 4px;
        color: var(--green);
      }
      .desc-text b {
        color: var(--orange);
        font-weight: 600;
      }

      /* stack visualization */
      .stack-area {
        flex: 1;
        overflow-y: auto;
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        gap: 0;
      }

      .addr-row {
        font-family: var(--mono);
        font-size: 14px;
        color: var(--text-faint);
        text-align: center;
        padding: 4px 0 2px;
        letter-spacing: 0.05em;
      }

      .frame {
        overflow: hidden;
      }
      .frame.hidden {
        display: none;
      }

      .frame-slot {
        border-top: 1px solid var(--border);
        padding: 8px 16px;
        font-family: var(--mono);
        font-size: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: background 0.25s;
        background: var(--surface);
      }
      .frame.caller .frame-slot {
        background: rgba(100, 110, 120, 0.08);
      }
      .frame-ellipsis {
        border-top: 1px solid var(--border);
        padding: 5px 16px;
        font-family: var(--mono);
        font-size: 16px;
        color: var(--text-faint);
        text-align: center;
        letter-spacing: 0.15em;
      }
      .frame.caller .frame-ellipsis {
        border-top: none;
        border-bottom: 1px solid var(--border);
      }
      .frame.free .frame-ellipsis {
        border-bottom: none;
      }
      .frame.free .frame-slot {
        background: var(--bg);
        border-top-style: dashed;
      }
      .frame.free .slot-name,
      .frame.free .slot-val {
        color: var(--text-faint);
      }
      .slot-name {
        color: var(--text-dim);
      }
      .slot-val {
        color: var(--text);
        font-weight: 600;
      }

      .stack-wrapper {
        display: flex;
        align-items: flex-start;
        position: relative;
        gap: 12px;
      }
      .offset-arrows {
        position: absolute;
        right: 100%;
        top: 0;
        height: 100%;
        pointer-events: none;
      }
      .offset-arrow {
        position: absolute;
        right: 0;
        font-family: var(--mono);
        font-size: 16px;
        color: var(--text-faint);
        white-space: nowrap;
        transform: translateY(-50%);
        display: flex;
        align-items: center;
        gap: 0;
        padding-right: 8px;
      }
      .stack-column {
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        margin-top: 20px;
        overflow: hidden;
        flex: 0 0 auto;
        min-width: 320px;
      }
      .sp-arrow {
        position: absolute;
        right: 100%;
        font-family: var(--mono);
        font-size: 16px;
        color: var(--green);
        white-space: nowrap;
        pointer-events: none;
        transform: translateY(-50%);
        transition: top 0.45s ease;
        display: flex;
        align-items: center;
        gap: 0;
        padding-right: 8px;
      }
      .sp-label {
        margin-right: 6px;
      }
      .sp-arrow-shaft {
        display: inline-block;
        width: 20px;
        height: 2px;
        background: currentColor;
      }
      .sp-arrow-head {
        display: inline-block;
        width: 0;
        height: 0;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
        border-left: 9px solid currentColor;
      }
      .frame-labels {
        position: absolute;
        left: calc(100% + 12px);
        top: 0;
      }
      .flabel {
        position: absolute;
        left: 0;
        font-family: var(--mono);
        font-size: 16px;
        color: var(--text-dim);
        transform: translateY(-50%);
        white-space: nowrap;
        pointer-events: none;
      }

      /* ── REGISTERS PANEL ── */
      .reg-panel {
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .panel-title {
        font-family: var(--mono);
        font-size: 14px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-dim);
        padding: 9px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        flex-shrink: 0;
      }
      .reg-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }
      .reg-row {
        display: flex;
        flex-direction: column;
        padding: 8px 16px;
        gap: 1px;
        border-left: 2px solid transparent;
        transition:
          background 0.2s,
          border-color 0.2s;
      }
      .reg-row.hi {
        background: var(--orange-dim);
        border-left-color: var(--orange);
      }
      .reg-name {
        font-family: var(--mono);
        font-size: 17px;
        color: var(--green);
        font-weight: 600;
      }
      .reg-val {
        font-family: var(--mono);
        font-size: 16px;
        color: var(--text);
      }
      .reg-desc {
        font-size: 14px;
        color: var(--text-faint);
      }
      [data-tooltip] { cursor: default; }
      #tooltip {
        position: fixed;
        background: var(--text);
        color: var(--bg);
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 12px;
        white-space: pre;
        z-index: 9999;
        pointer-events: none;
        font-weight: normal;
        font-family: var(--mono);
        display: none;
      }

      /* ── CONTROLS ── */
      .controls {
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        padding: 6px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .step-counter {
        font-family: var(--mono);
        font-size: 13px;
        color: var(--text-faint);
        min-width: 70px;
      }
      .progress-bar {
        flex: 1;
        height: 8px;
        background: var(--border);
        border-radius: 4px;
        cursor: pointer;
        position: relative;
      }
      .progress-fill {
        height: 100%;
        background: var(--blue);
        border-radius: 4px;
        transition: width 0.15s ease;
        pointer-events: none;
      }
      .progress-fill.scrubbing {
        transition: none;
      }
      #progress-thumb {
        position: absolute;
        top: 50%;
        width: 14px;
        height: 14px;
        background: var(--blue);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        box-shadow: 0 1px 4px rgba(0,0,0,0.25);
        transition: left 0.15s ease;
        z-index: 1;
      }
      #progress-thumb.scrubbing {
        transition: none;
      }
      .step-tick {
        position: absolute;
        top: 0;
        width: 1px;
        height: 100%;
        background: rgba(255, 255, 255, 0.45);
        pointer-events: none;
        transform: translateX(-50%);
      }

      .btn {
        font-family: var(--mono);
        font-size: 13px;
        padding: 6px 16px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text);
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s;
        white-space: nowrap;
      }
      .btn:hover:not(:disabled) {
        background: var(--surface);
        border-color: var(--text-dim);
      }
      .btn:disabled {
        opacity: 0.3;
        cursor: default;
      }
      .btn.primary {
        background: var(--blue);
        border-color: var(--blue);
        color: #fff;
        font-weight: 600;
      }
      .btn.primary:hover:not(:disabled) {
        background: #0860ca;
      }

      select.btn {
        padding: 5px 10px;
      }

      .scrollable::-webkit-scrollbar {
        width: 4px;
      }
      .scrollable::-webkit-scrollbar-track {
        background: transparent;
      }
      .scrollable::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <select class="btn" id="prog-select"></select>
      <span class="step-counter" id="step-counter">0 / 0</span>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        <div id="progress-thumb"></div>
      </div>
      <button class="btn" id="btn-prev" onclick="go(-1)" disabled>← Anterior</button>
      <button class="btn" id="btn-next" onclick="go(1)">Siguiente →</button>
    </div>

    <div class="main">
      <!-- LEFT: assembly -->
      <div class="code-panel">
        <div class="code-scroll scrollable">
          <div id="view-asm">
            <!-- filled by JS -->
          </div>
        </div>
      </div>

      <!-- CENTER: pila + descripción -->
      <div class="center-panel">
        <div class="stack-area scrollable" id="stack-area">
          <!-- filled by JS -->
        </div>
        <div class="description-box">
          <div class="desc-label">Qué está pasando</div>
          <div class="desc-text" id="desc-text">Usa el botón Siguiente para comenzar.</div>
        </div>
      </div>

      <!-- RIGHT: registros -->
      <div class="reg-panel">
        <div class="panel-title">Registros</div>
        <div class="reg-list scrollable" id="reg-list">
          <!-- filled by JS -->
        </div>
      </div>
    </div>

    <script>
      // ─── Programs ──────────────────────────────────────────────────────────────
      // To add a new program: append an entry to this array.
      // functions: object mapping name → array of instruction strings (in order).
      // The first function listed determines the lowest address block.
      const PROGRAMS = [
        {
          name: "baz llama a foo",
          entryPoint: "baz",
          initialRegs: { sp: 0x1000, ra: 0x8050, a0: 3, s0: 2 },
          baseAddress: 0x8000,
          functions: {
            foo: [
              "addi a0, a0, 1",
              "ret"
            ],
            baz: [
              "addi sp, sp, -16",
              "sw   ra, 12(sp)",
              "sw   s0, 8(sp)",
              "mv   s0, a0",
              "li   a0, 1",
              "call foo",
              "add  a0, a0, s0",
              "lw   ra, 12(sp)",
              "lw   s0, 8(sp)",
              "addi sp, sp, 16",
              "ret"
            ]
          }
        },
        {
          name: "función hoja simple",
          entryPoint: "double",
          initialRegs: { sp: 0x1000, ra: 0x9000, a0: 5, s0: 0 },
          baseAddress: 0x8000,
          functions: {
            double: [
              "add  a0, a0, a0",
              "ret"
            ]
          }
        }
      ];

      // ─── Constants ────────────────────────────────────────────────────────────
      const REG_SET = new Set([
        'zero','ra','sp','gp','tp','fp',
        'a0','a1','a2','a3','a4','a5','a6','a7',
        's0','s1','s2','s3','s4','s5','s6','s7','s8','s9','s10','s11',
        't0','t1','t2','t3','t4','t5','t6'
      ]);
      const ALL_REGS = [
        'zero','ra','sp','gp','tp',
        'a0','a1','a2','a3','a4','a5','a6','a7',
        's0','s1','s2','s3','s4','s5','s6','s7','s8','s9','s10','s11',
        't0','t1','t2','t3','t4','t5','t6','fp'
      ];
      // Colors cycling per frame depth (index 0 = outermost active frame)
      const FRAME_COLORS = [
        'var(--green-dim)',
        'var(--blue-dim)',
        'var(--orange-dim)',
        'var(--purple-dim)'
      ];
      const GHOST_ROWS = 3;
      const OFFSET_MAX = 64; // only show sp±N labels within this range

      // ─── Helpers ──────────────────────────────────────────────────────────────
      const hx = (v) => "0x" + (v >>> 0).toString(16).toUpperCase().padStart(4, "0");

      // ─── Instruction parser ───────────────────────────────────────────────────
      function parseInstr(raw) {
        const s = raw.trim().replace(/\s+/g, ' ');
        const sp = s.indexOf(' ');
        const op = sp === -1 ? s : s.slice(0, sp);
        const argStr = sp === -1 ? '' : s.slice(sp + 1);
        const args = argStr ? argStr.split(',').map(a => a.trim()) : [];

        if (op === 'ret') return { op };
        if (op === 'call' || op === 'j' || op === 'jal') return { op: op === 'jal' ? 'call' : op, target: args[args.length - 1] };
        if (op === 'li') return { op, rd: args[0], imm: Number(args[1]) };
        if (op === 'mv') return { op, rd: args[0], rs1: args[1] };
        if (op === 'neg') return { op, rd: args[0], rs1: args[1] };
        if (op === 'nop') return { op };
        if (op === 'addi' || op === 'slli' || op === 'srli' || op === 'srai' || op === 'andi' || op === 'ori' || op === 'xori') {
          return { op, rd: args[0], rs1: args[1], imm: Number(args[2]) };
        }
        if (['add','sub','mul','div','rem','and','or','xor','sll','srl','sra'].includes(op)) {
          return { op, rd: args[0], rs1: args[1], rs2: args[2] };
        }

        // sw/lw/sb/lb/sh/lh: reg, offset(base)
        if (['sw','lw','sb','lb','sh','lh','lbu','lhu'].includes(op)) {
          const mem = args[1] && args[1].match(/^(-?\d+)\((\w+)\)$/);
          if (mem) {
            if (op === 'sw' || op === 'sb' || op === 'sh') {
              return { op, rs2: args[0], offset: Number(mem[1]), rs1: mem[2] };
            }
            return { op, rd: args[0], offset: Number(mem[1]), rs1: mem[2] };
          }
        }

        // Branches: rs1, rs2, label
        if (['beq','bne','blt','bge','bltu','bgeu'].includes(op)) {
          return { op, rs1: args[0], rs2: args[1], target: args[2] };
        }

        return { op, raw: s };
      }

      // ─── Assembler: assign addresses ──────────────────────────────────────────
      function assembleProgram(prog) {
        const instrs = []; // { fn, addr, raw, ...parsed }
        const labels = {}; // fn name → first address
        let addr = prog.baseAddress;

        for (const [fn, lines] of Object.entries(prog.functions)) {
          labels[fn] = addr;
          for (const line of lines) {
            const parsed = parseInstr(line);
            instrs.push({ fn, addr, raw: line.trim(), ...parsed });
            addr += 4;
          }
        }
        return { instrs, labels };
      }

      // ─── Syntax highlighter ───────────────────────────────────────────────────
      function highlightInstr(raw) {
        const s = raw.trim();
        const sp = s.indexOf(' ');
        const op = sp === -1 ? s : s.slice(0, sp);
        const rest = sp === -1 ? '' : s.slice(sp + 1);

        let html = `<span class="kw">${op}</span>`;
        if (!rest) return html;

        const tokenHtml = (tok) => {
          const t = tok.trim();
          const memM = t.match(/^(-?\d+)\((\w+)\)$/);
          if (memM) return `<span class="imm">${memM[1]}</span>(<span class="reg">${memM[2]}</span>)`;
          if (REG_SET.has(t)) return `<span class="reg">${t}</span>`;
          if (/^-?\d+$/.test(t)) return `<span class="imm">${t}</span>`;
          return `<span class="fn">${t}</span>`;
        };

        const toks = rest.split(',');
        html += ' ' + toks.map((tok, i) => tokenHtml(tok) + (i < toks.length - 1 ? ',' : '')).join(' ');
        return html;
      }

      // ─── Simulator ────────────────────────────────────────────────────────────
      function simulate(prog) {
        const { instrs, labels } = assembleProgram(prog);
        const addrMap = new Map(instrs.map(i => [i.addr, i]));

        // Initialize registers (all zero, then apply initialRegs)
        const regs = {};
        for (const r of ALL_REGS) regs[r] = 0;
        regs.zero = 0;
        for (const [k, v] of Object.entries(prog.initialRegs)) regs[k] = v;
        // s0 and fp are the same hardware register (x8)
        regs.fp = regs.s0;

        const mem = new Map();        // addr (number) → value (number)
        const slotLabels = new Map(); // addr (number) → saved register name string

        let pc = labels[prog.entryPoint];

        // callStack: [{fn, entrySpBefore, allocatedSize}]
        // entrySpBefore: sp at the moment this function was entered
        // allocatedSize: bytes allocated by prologue (entrySpBefore - currentSp when inside frame)
        const callStack = [{ fn: prog.entryPoint, entrySpBefore: regs.sp, allocatedSize: 0 }];

        const steps = [];

        function snap() {
          return {
            regs: { ...regs },
            mem: new Map(mem),
            slotLabels: new Map(slotLabels),
            callStack: callStack.map(f => ({ ...f })),
            pc,
          };
        }

        function makeStep(s, desc, hiReg, hiSlots, instrAddr, nextAddr) {
          return {
            desc,
            aHl: instrAddr != null ? [instrAddr] : [],
            nextAddr: nextAddr ?? null,
            regs: s.regs,
            hiReg: hiReg || [],
            mem: s.mem,
            hiSlots: hiSlots || [],
            slotLabels: s.slotLabels,
            callStack: s.callStack,
          };
        }

        function syncFpS0(rd) {
          if (rd === 's0') regs.fp = regs.s0;
          if (rd === 'fp') regs.s0 = regs.fp;
        }

        // Emit initial step (state before first instruction)
        steps.push(makeStep(snap(),
          `La función <code>${prog.entryPoint}</code> es llamada con <code>a0</code> = ${regs.a0}. ` +
          `<code>sp</code> = <code>${hx(regs.sp)}</code>, <code>ra</code> = <code>${hx(regs.ra)}</code> (dirección de retorno al caller).`,
          ['sp', 'ra', 'a0'], [], null, pc));

        // Format a register value for use in description text
        const ADDR_REGS = new Set(['ra', 'sp', 'fp', 'gp', 'tp']);
        const fmtVal = (name, val) => ADDR_REGS.has(name) ? hx(val) : String(val);

        const MAX_STEPS = 500;

        while (steps.length < MAX_STEPS) {
          const instr = addrMap.get(pc);
          if (!instr) break;

          const prev = { ...regs };
          const instrAddr = pc;
          let desc = '', hiReg = [], hiSlots = [];
          let stepPushed = false; // set by ret to avoid double-push

          switch (instr.op) {
            case 'addi':
            case 'andi':
            case 'ori':
            case 'xori': {
              const ops = { addi: (a,b) => a+b, andi: (a,b) => a&b, ori: (a,b) => a|b, xori: (a,b) => a^b };
              const val = ops[instr.op](regs[instr.rs1], instr.imm);
              regs[instr.rd] = val;
              syncFpS0(instr.rd);
              pc += 4;
              hiReg = [instr.rd];

              if (instr.op === 'addi' && instr.rd === 'sp') {
                const top = callStack[callStack.length - 1];
                top.allocatedSize = top.entrySpBefore - val;
                if (instr.imm < 0)
                  desc = `<b>Prólogo</b>: <code>addi sp, sp, ${instr.imm}</code> — reserva ${-instr.imm} bytes en la pila. <code>sp</code> baja a <code>${hx(val)}</code>.`;
                else
                  desc = `<b>Epílogo</b>: <code>addi sp, sp, +${instr.imm}</code> — libera ${instr.imm} bytes. <code>sp</code> sube a <code>${hx(val)}</code>.`;
              } else {
                desc = `<code>${instr.op} ${instr.rd}, ${instr.rs1}, ${instr.imm}</code> — <code>${instr.rd}</code> = ${prev[instr.rs1]} ${instr.op === 'addi' ? '+' : ''} ${instr.imm} = <b>${val}</b>.`;
              }
              break;
            }

            case 'slli':
            case 'srli':
            case 'srai': {
              const ops = { slli: (a,b) => a<<b, srli: (a,b) => a>>>b, srai: (a,b) => a>>b };
              const val = ops[instr.op](regs[instr.rs1], instr.imm);
              regs[instr.rd] = val;
              syncFpS0(instr.rd);
              pc += 4;
              hiReg = [instr.rd];
              desc = `<code>${instr.op} ${instr.rd}, ${instr.rs1}, ${instr.imm}</code> — <code>${instr.rd}</code> = ${prev[instr.rs1]} shift ${instr.imm} = <b>${val}</b>.`;
              break;
            }

            case 'add':
            case 'sub':
            case 'mul':
            case 'div':
            case 'rem':
            case 'and':
            case 'or':
            case 'xor':
            case 'sll':
            case 'srl':
            case 'sra': {
              const ops = {
                add: (a,b) => a+b, sub: (a,b) => a-b, mul: (a,b) => a*b,
                div: (a,b) => b === 0 ? 0 : Math.trunc(a/b), rem: (a,b) => b === 0 ? a : a%b,
                and: (a,b) => a&b, or: (a,b) => a|b, xor: (a,b) => a^b,
                sll: (a,b) => a<<b, srl: (a,b) => a>>>b, sra: (a,b) => a>>b
              };
              const syms = { add:'+', sub:'-', mul:'×', div:'÷', rem:'%', and:'&', or:'|', xor:'^', sll:'<<', srl:'>>>', sra:'>>' };
              const val = ops[instr.op](regs[instr.rs1], regs[instr.rs2]);
              regs[instr.rd] = val;
              syncFpS0(instr.rd);
              pc += 4;
              hiReg = [instr.rd];
              desc = `<code>${instr.op} ${instr.rd}, ${instr.rs1}, ${instr.rs2}</code> — <code>${instr.rd}</code> = ${prev[instr.rs1]} ${syms[instr.op]} ${prev[instr.rs2]} = <b>${val}</b>.`;
              break;
            }

            case 'sw':
            case 'sb':
            case 'sh': {
              const addr = regs[instr.rs1] + instr.offset;
              mem.set(addr, regs[instr.rs2]);
              slotLabels.set(addr, instr.rs2);
              pc += 4;
              hiSlots = [addr];
              desc = `<code>${instr.op} ${instr.rs2}, ${instr.offset}(${instr.rs1})</code> — guarda <code>${instr.rs2}</code> = ${fmtVal(instr.rs2, regs[instr.rs2])} en dirección <code>${hx(addr)}</code>.`;
              break;
            }

            case 'lw':
            case 'lb':
            case 'lh':
            case 'lbu':
            case 'lhu': {
              const addr = regs[instr.rs1] + instr.offset;
              const val = mem.get(addr) ?? 0;
              regs[instr.rd] = val;
              syncFpS0(instr.rd);
              pc += 4;
              hiReg = [instr.rd];
              hiSlots = [addr];
              desc = `<code>${instr.op} ${instr.rd}, ${instr.offset}(${instr.rs1})</code> — restaura <code>${instr.rd}</code> = <b>${fmtVal(instr.rd, val)}</b> desde dirección <code>${hx(addr)}</code>.`;
              break;
            }

            case 'mv': {
              regs[instr.rd] = regs[instr.rs1];
              syncFpS0(instr.rd);
              pc += 4;
              hiReg = [instr.rd];
              desc = `<code>mv ${instr.rd}, ${instr.rs1}</code> — <code>${instr.rd}</code> ← <code>${instr.rs1}</code> = <b>${prev[instr.rs1]}</b>.`;
              break;
            }

            case 'neg': {
              regs[instr.rd] = -regs[instr.rs1];
              syncFpS0(instr.rd);
              pc += 4;
              hiReg = [instr.rd];
              desc = `<code>neg ${instr.rd}, ${instr.rs1}</code> — <code>${instr.rd}</code> = -${prev[instr.rs1]} = <b>${regs[instr.rd]}</b>.`;
              break;
            }

            case 'li': {
              regs[instr.rd] = instr.imm;
              syncFpS0(instr.rd);
              pc += 4;
              hiReg = [instr.rd];
              desc = `<code>li ${instr.rd}, ${instr.imm}</code> — carga el inmediato <b>${instr.imm}</b> en <code>${instr.rd}</code>.`;
              break;
            }

            case 'call': {
              const target = labels[instr.target];
              if (target == null) { pc += 4; desc = `<code>call ${instr.target}</code> — función no encontrada.`; break; }
              regs.ra = pc + 4;
              pc = target;
              callStack.push({ fn: instr.target, entrySpBefore: regs.sp, allocatedSize: 0 });
              hiReg = ['ra'];
              desc = `<code>call ${instr.target}</code> — guarda dirección de retorno en <code>ra</code> = <code>${hx(regs.ra)}</code> y salta a <code>${instr.target}</code>.`;
              break;
            }

            case 'j': {
              const target = labels[instr.target];
              if (target == null) { pc += 4; desc = `<code>j ${instr.target}</code> — etiqueta no encontrada.`; break; }
              pc = target;
              desc = `<code>j ${instr.target}</code> — salta incondicionalmente a <code>${instr.target}</code>.`;
              break;
            }

            case 'beq':
            case 'bne':
            case 'blt':
            case 'bge':
            case 'bltu':
            case 'bgeu': {
              const conds = {
                beq: (a,b) => a===b, bne: (a,b) => a!==b,
                blt: (a,b) => a<b,   bge: (a,b) => a>=b,
                bltu: (a,b) => (a>>>0)<(b>>>0), bgeu: (a,b) => (a>>>0)>=(b>>>0)
              };
              const taken = conds[instr.op](regs[instr.rs1], regs[instr.rs2]);
              const target = labels[instr.target];
              pc = taken && target != null ? target : pc + 4;
              desc = `<code>${instr.op} ${instr.rs1}, ${instr.rs2}, ${instr.target}</code> — ${regs[instr.rs1]} vs ${regs[instr.rs2]}: rama ${taken ? '<b>tomada</b>' : 'no tomada'}.`;
              break;
            }

            case 'nop': {
              pc += 4;
              desc = `<code>nop</code> — no operation.`;
              break;
            }

            case 'ret': {
              const retAddr = regs.ra;
              pc = retAddr;
              hiReg = ['ra', 'a0'];
              desc = `<code>ret</code> — retorna a <code>ra</code> = <code>${hx(retAddr)}</code>. Valor de retorno: <code>a0</code> = <b>${regs.a0}</b>.`;
              const retSnap = snap(); // snapshot before pop so callerBase stays stable
              callStack.pop();
              const retNextAddr = callStack.length === 0 ? null : pc;
              steps.push(makeStep(retSnap, desc, hiReg, hiSlots, instrAddr, retNextAddr));
              stepPushed = true;
              break;
            }

            default: {
              pc += 4;
              desc = `<code>${instr.raw ?? instr.op}</code>`;
              break;
            }
          }

          if (!stepPushed) steps.push(makeStep(snap(), desc, hiReg, hiSlots, instrAddr, pc));

          // Stop if we've returned from the top-level function
          if (callStack.length === 0) break;
        }

        return steps;
      }

      // ─── Build assembly view ───────────────────────────────────────────────────
      function buildAsmView(prog) {
        const { instrs } = assembleProgram(prog);
        const el = document.getElementById("view-asm");
        let html = '';
        let lastFn = null;

        for (const instr of instrs) {
          if (instr.fn !== lastFn) {
            if (lastFn !== null) {
              html += `<div class="line"><span class="asm-addr"></span><span> </span></div>`;
            }
            html += `<div class="line"><span class="asm-addr"></span><span class="lbl">${instr.fn}:</span></div>`;
            lastFn = instr.fn;
          }
          html += `<div class="line" id="al-${instr.addr.toString(16)}"><span class="pc-arrow">▶</span><span class="asm-addr">${hx(instr.addr)}</span><span>  ${highlightInstr(instr.raw)}</span></div>`;
        }

        el.innerHTML = html;
      }

      // ─── Render ───────────────────────────────────────────────────────────────
      const DISPLAY_REGS = [
        { name: "sp", desc: "stack pointer",    key: "sp" },
        { name: "ra", desc: "dirección retorno", key: "ra" },
        { name: "a0", desc: "arg / retorno",    key: "a0" },
        { name: "s0", desc: "callee-saved",     key: "s0" },
        { name: "a1", desc: "arg 2",            key: "a1" },
        { name: "t0", desc: "temporal",         key: "t0" },
        { name: "t1", desc: "temporal",         key: "t1" },
        { name: "fp", desc: "frame pointer",    key: "fp" },
      ];

      function fmtRegVal(key, val) {
        if (val == null) return RAND_REGS[key] ?? '?';
        return hx(val);
      }

      function render(s) {
        // Description
        document.getElementById("desc-text").innerHTML = s.desc;

        // Assembly highlight — keyed by instruction address
        document.querySelectorAll("#view-asm .line.hl").forEach(el => el.classList.remove('hl'));
        for (const addr of (s.aHl || [])) {
          const el = document.getElementById("al-" + addr.toString(16));
          if (el) {
            el.classList.add('hl');
            el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          }
        }

        // Next-instruction arrow
        document.querySelectorAll("#view-asm .line.next-instr").forEach(el => el.classList.remove('next-instr'));
        if (s.nextAddr != null) {
          const el = document.getElementById("al-" + s.nextAddr.toString(16));
          if (el) {
            el.classList.add('next-instr');
            if ((s.aHl || []).length === 0) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          }
        }

        // Registers
        const hiR = new Set(s.hiReg || []);
        document.getElementById("reg-list").innerHTML = DISPLAY_REGS.map(r => {
          const val = s.regs ? s.regs[r.key] : null;
          const tip = val != null
            ? `data-tooltip="sin signo: ${val >>> 0}&#10;con signo: ${val | 0}"`
            : '';
          return `<div class="reg-row${hiR.has(r.name) ? ' hi' : ''}">
            <span class="reg-name">${r.name}</span>
            <span class="reg-val" ${tip}>${fmtRegVal(r.key, val)}</span>
            <span class="reg-desc">${r.desc}</span>
          </div>`;
        }).join('');

        // Stack
        buildStack(s);
        requestAnimationFrame(() => {
          positionSpArrow(s);
          positionLabels(s);
          positionOffsets(s);
        });

        // Controls
        document.getElementById("step-counter").textContent = `${cur + 1} / ${STEPS.length}`;
        const n = STEPS.length;
        const pct = n <= 1 ? 100 : cur / (n - 1) * 100;
        document.getElementById("progress-fill").style.width = pct + '%';
        document.getElementById("progress-thumb").style.left = `clamp(7px, ${pct}%, calc(100% - 7px))`;
        document.getElementById("btn-prev").disabled = cur === 0;
        document.getElementById("btn-next").disabled = cur === STEPS.length - 1;
      }

      // ─── Stack builder ────────────────────────────────────────────────────────
      // Slot IDs use lowercase hex address: "slot-ff0", "slot-1000", etc.
      function buildStack(s) {
        const hiS = new Set(s.hiSlots || []);
        const col = document.getElementById("stack-column");
        const currentSp = s.regs ? s.regs.sp : 0;
        const callerBase = s.callStack && s.callStack.length > 0 ? s.callStack[0].entrySpBefore : currentSp + 16;

        let html = '';

        // ── Top ghost: caller frame ──
        let callerSlots = '';
        for (let i = 0; i < GHOST_ROWS; i++) {
          const addr = callerBase + (GHOST_ROWS - i) * 4;
          const opacity = ((i + 1) / (GHOST_ROWS + 1)).toFixed(2);
          callerSlots += `<div class="frame-slot" id="slot-${addr.toString(16)}" style="opacity:${opacity}">` +
            `<span class="slot-name">${hx(addr)}</span><span class="slot-val">—</span></div>`;
        }
        // The slot at callerBase itself (boundary)
        callerSlots += `<div class="frame-slot" id="slot-${callerBase.toString(16)}">` +
          `<span class="slot-name">${hx(callerBase)}</span>` +
          `<span class="slot-val" style="color:var(--text-faint)">—</span></div>`;

        html += `<div class="frame caller" id="fr-caller">
          <div class="frame-ellipsis"><div>dirección alta</div><div>↑</div></div>
          ${callerSlots}
        </div>`;

        // ── Active frames: oldest (index 0) to newest ──
        const activeFrames = (s.callStack || []).filter(f => f.allocatedSize > 0);
        for (let fi = 0; fi < activeFrames.length; fi++) {
          const frame = activeFrames[fi];
          const color = FRAME_COLORS[fi % FRAME_COLORS.length];
          const frameTop = frame.entrySpBefore;
          const frameBot = frame.entrySpBefore - frame.allocatedSize;

          let frameSlots = '';
          for (let addr = frameTop - 4; addr >= frameBot; addr -= 4) {
            const label = s.slotLabels && s.slotLabels.get(addr);
            const val = s.mem && s.mem.get(addr);
            const slotName = label ? `${hx(addr)}&nbsp;&nbsp;${label}` : hx(addr);
            const slotVal = val !== undefined ? hx(val) : '—';
            const slotTip = val !== undefined
              ? `data-tooltip="sin signo: ${val >>> 0}&#10;con signo: ${val | 0}"`
              : '';
            const isHi = hiS.has(addr);
            const bg = isHi ? 'var(--orange-dim)' : color;
            const nameColor = label ? 'var(--blue)' : '';
            frameSlots += `<div class="frame-slot" id="slot-${addr.toString(16)}" style="background:${bg}">` +
              `<span class="slot-name"${nameColor ? ` style="color:${nameColor}"` : ''}>${slotName}</span>` +
              `<span class="slot-val" ${slotTip}>${slotVal}</span></div>`;
          }

          html += `<div class="frame" id="fr-active-${fi}" data-fn="${frame.fn}">${frameSlots}</div>`;
        }

        // ── Bottom ghost: free zone below sp ──
        let freeSlots = '';
        for (let i = 0; i < GHOST_ROWS; i++) {
          const addr = currentSp - (i + 1) * 4;
          const opacity = ((GHOST_ROWS - i) / (GHOST_ROWS + 1)).toFixed(2);
          freeSlots += `<div class="frame-slot" style="opacity:${opacity};background:var(--bg);border-top-style:dashed">` +
            `<span class="slot-name" style="color:var(--text-faint)">${hx(addr)}</span>` +
            `<span class="slot-val" style="color:var(--text-faint)">—</span></div>`;
        }
        html += `<div class="frame free" id="fr-free">
          ${freeSlots}
          <div class="frame-ellipsis"><div>↓</div><div>dirección baja</div></div>
        </div>`;

        col.innerHTML = html;
      }

      // ─── SP arrow ─────────────────────────────────────────────────────────────
      let _firstArrowRender = true;

      function positionSpArrow(s) {
        const arrow = document.getElementById("sp-arrow");
        const wrapper = document.getElementById("stack-wrapper");
        if (!arrow || !wrapper) return;

        const spAddr = s.regs ? s.regs.sp : 0;

        // Find the slot element at the current sp address
        let target = document.getElementById("slot-" + spAddr.toString(16));

        // Fallback: the boundary slot at callerBase
        if (!target) {
          const callerBase = s.callStack && s.callStack.length > 0 ? s.callStack[0].entrySpBefore : spAddr;
          target = document.getElementById("slot-" + callerBase.toString(16));
        }
        if (!target) return;

        const wRect = wrapper.getBoundingClientRect();
        const tRect = target.getBoundingClientRect();
        const top = tRect.top - wRect.top + tRect.height / 2;

        if (_firstArrowRender) {
          arrow.style.transition = 'none';
          arrow.style.top = top + 'px';
          arrow.getBoundingClientRect(); // force reflow before re-enabling transition
          arrow.style.transition = '';
          _firstArrowRender = false;
        } else {
          arrow.style.top = top + 'px';
        }
      }

      // ─── Frame labels ─────────────────────────────────────────────────────────
      function positionLabels(s) {
        const col = document.getElementById("stack-column");
        const labelsEl = document.getElementById("frame-labels");
        if (!col || !labelsEl) return;

        const colTop = col.getBoundingClientRect().top;
        let html = '';

        const activeFrames = (s.callStack || []).filter(f => f.allocatedSize > 0);
        for (let fi = 0; fi < activeFrames.length; fi++) {
          const frame = activeFrames[fi];
          const frEl = document.getElementById("fr-active-" + fi);
          if (!frEl) continue;
          const firstSlot = frEl.querySelector(".frame-slot");
          if (!firstSlot) continue;
          const rect = firstSlot.getBoundingClientRect();
          const top = rect.top - colTop + rect.height / 2;
          html += `<span class="flabel" style="top:${top}px">${frame.fn}</span>`;
        }

        labelsEl.innerHTML = html;
      }

      // ─── Offset arrows ────────────────────────────────────────────────────────
      function positionOffsets(s) {
        const container = document.getElementById("offset-arrows");
        const wrapper = document.getElementById("stack-wrapper");
        if (!container || !wrapper) return;

        const wTop = wrapper.getBoundingClientRect().top;
        const spVal = s.regs ? s.regs.sp : 0;
        let html = '';

        // Iterate all named slot elements and label those within ±OFFSET_MAX of sp
        const slots = document.querySelectorAll(".frame-slot[id^='slot-']");
        for (const slot of slots) {
          const addrHex = slot.id.slice(5); // "slot-ff0" → "ff0"
          const addr = parseInt(addrHex, 16);
          const offset = addr - spVal;
          if (offset === 0) continue; // sp+0 is shown by the sp arrow itself
          if (Math.abs(offset) > OFFSET_MAX) continue;
          const sign = offset > 0 ? '+' : '';
          const opacity = parseFloat(slot.style.opacity || '1');
          const rect = slot.getBoundingClientRect();
          const top = rect.top - wTop + rect.height / 2;
          html += `<div class="offset-arrow" style="top:${top}px;opacity:${opacity}">sp${sign}${offset}</div>`;
        }

        container.innerHTML = html;
      }

      // ─── Navigation ───────────────────────────────────────────────────────────
      let cur = 0;
      let STEPS = [];

      function goTo(idx) {
        cur = Math.max(0, Math.min(STEPS.length - 1, idx));
        render(STEPS[cur]);
      }

      function go(dir) {
        goTo(cur + dir);
      }

      // ─── Program loader ───────────────────────────────────────────────────────
      function buildTicks() {
        bar.querySelectorAll('.step-tick').forEach(el => el.remove());
        const n = STEPS.length;
        for (let i = 1; i < n - 1; i++) {
          const tick = document.createElement('div');
          tick.className = 'step-tick';
          tick.style.left = (i / (n - 1) * 100) + '%';
          bar.appendChild(tick);
        }
      }

      function loadProgram(prog) {
        _firstArrowRender = true;
        STEPS = simulate(prog);
        cur = 0;
        buildAsmView(prog);
        render(STEPS[0]);
        buildTicks();
      }

      // ─── Init ─────────────────────────────────────────────────────────────────
      const rh = () =>
        "0x" + Math.floor(Math.random() * 0xffffffff).toString(16).toUpperCase().padStart(8, "0");
      const RAND_REGS = {};
      for (const r of ALL_REGS) RAND_REGS[r] = rh();

      // Progress bar scrubber
      const bar   = document.querySelector('.progress-bar');
      const fill  = document.getElementById('progress-fill');
      const thumb = document.getElementById('progress-thumb');
      function scrubTo(e) {
        const rect = bar.getBoundingClientRect();
        const ratio = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
        goTo(Math.round(ratio * (STEPS.length - 1)));
      }
      bar.addEventListener('pointerdown', e => {
        fill.classList.add('scrubbing');
        thumb.classList.add('scrubbing');
        bar.setPointerCapture(e.pointerId);
        scrubTo(e);
      });
      bar.addEventListener('pointermove', e => {
        if (!bar.hasPointerCapture(e.pointerId)) return;
        scrubTo(e);
      });
      bar.addEventListener('pointerup', e => {
        bar.releasePointerCapture(e.pointerId);
        fill.classList.remove('scrubbing');
        thumb.classList.remove('scrubbing');
      });

      // Populate program selector
      const sel = document.getElementById("prog-select");
      PROGRAMS.forEach((p, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = p.name;
        sel.appendChild(opt);
      });
      sel.addEventListener("change", () => loadProgram(PROGRAMS[parseInt(sel.value)]));

      // Build persistent stack skeleton (arrow + column + labels)
      document.getElementById("stack-area").innerHTML = `
        <div class="stack-wrapper" id="stack-wrapper">
          <div class="offset-arrows" id="offset-arrows"></div>
          <div class="sp-arrow" id="sp-arrow"><span class="sp-label">sp</span><span class="sp-arrow-shaft"></span><span class="sp-arrow-head"></span></div>
          <div class="stack-column" id="stack-column"></div>
          <div class="frame-labels" id="frame-labels"></div>
        </div>
      `;

      loadProgram(PROGRAMS[0]);
      // ─── Tooltip ──────────────────────────────────────────────────────────────
      const tt = document.createElement('div');
      tt.id = 'tooltip';
      document.body.appendChild(tt);

      document.addEventListener('mouseover', e => {
        const el = e.target.closest('[data-tooltip]');
        if (!el) { tt.style.display = 'none'; return; }
        tt.textContent = el.dataset.tooltip;
        tt.style.display = 'block';
      });
      document.addEventListener('mouseout', e => {
        if (!e.target.closest('[data-tooltip]')) return;
        tt.style.display = 'none';
      });
      document.addEventListener('mousemove', e => {
        if (tt.style.display === 'none') return;
        const gap = 12;
        let x = e.clientX + gap;
        let y = e.clientY + gap;
        if (x + tt.offsetWidth > window.innerWidth)  x = e.clientX - tt.offsetWidth - gap;
        if (y + tt.offsetHeight > window.innerHeight) y = e.clientY - tt.offsetHeight - gap;
        tt.style.left = x + 'px';
        tt.style.top  = y + 'px';
      });
    </script>
  </body>
</html>
